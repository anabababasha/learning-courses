<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كورسات تعليمية تفاعلية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0F12; --card:#1A1E25; --white:#F0EDE6; --dim:#8B92A0;
  --cyan:#5FD4D4; --copper:#C77B3F; --line:rgba(240,237,230,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--white);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:10vh 6vw 6vh;
}
.mono{font-family:'IBM Plex Mono',monospace;}
h1{font-size:clamp(1.8rem,4vw,2.6rem); margin-bottom:0.6rem; text-align:center;}
.sub{color:var(--dim); margin-bottom:3.5rem; text-align:center; max-width:50ch;}
.list{display:flex; flex-direction:column; gap:1rem; width:100%; max-width:600px;}
.course-link{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--card); border:1px solid var(--line); border-radius:10px;
  padding:1.4rem 1.6rem; text-decoration:none; color:var(--white);
  transition:border-color 0.2s ease, transform 0.2s ease;
}
.course-link:hover{border-color:var(--cyan); transform:translateX(-4px);}
.course-link .ctitle{font-size:1.05rem; font-weight:600;}
.course-link .ctag{color:var(--dim); font-size:0.85rem; margin-top:0.3rem;}
.course-link .arrow{color:var(--copper); font-size:1.2rem;}
footer{margin-top:3rem; color:var(--dim); font-size:0.8rem; text-align:center;}
</style>
</head>
<body>
  <h1>كورسات تعليمية تفاعلية</h1>
  <p class="sub mono">مجموعة كورسات قصيرة وتفاعلية، تفتح مباشرة من المتصفح دون أي تثبيت.</p>
  <div class="list">
    <a class="course-link" href="electricity-fundamentals/">
      <div>
        <div class="ctitle">مبادئ الكهرباء الأولية</div>
        <div class="ctag mono">8 مفاهيم · محاكاة تفاعلية · 10 أسئلة اختبار نهائي</div>
      </div>
      <span class="arrow">←</span>
    </a>
  </div>
  <footer class="mono">يُضاف هنا كل كورس جديد فور رفعه.</footer>
</body>
</html>
